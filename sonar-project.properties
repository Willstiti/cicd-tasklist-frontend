sonar.projectKey=William-examen-frontend
sonar.projectName=cicd-tasklist-frontend
sonar.sourceEncoding=UTF-8

# Analyze application code and classify Vitest files as tests.
sonar.sources=src
sonar.tests=src/__tests__
sonar.test.inclusions=src/__tests__/**/*.test.ts,src/__tests__/**/*.test.tsx

# Reuse Vitest coverage.
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.tsconfigPath=tsconfig.json

# Keep generated/bootstrap files out of quality metrics.
sonar.exclusions=src/__tests__/**,src/main.tsx
sonar.coverage.exclusions=src/__tests__/**,src/main.tsx